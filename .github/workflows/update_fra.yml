name: Update PLN FRA rates

on:
  schedule:
    - cron: '0 8 * * 1-5'    # Pon-Pt 08:00 UTC = 09:00 CET / 10:00 CEST
    - cron: '0 16 * * 1-5'   # Pon-Pt 16:00 UTC = 17:00 CET / 18:00 CEST
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch FRA rates
        run: python fetch_fra.py

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ 2>/dev/null || true
          git diff --cached --quiet || (git commit -m "FRA: aktualizacja $(date '+%Y-%m-%dT%H:%M')" && git push)
